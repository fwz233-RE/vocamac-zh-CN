baseURL = "https://fwz233-re.github.io/vocamac-zh-CN/"
languageCode = "zh-cn"
title = "VocaMac - macOS 全本地语音转文字"

[params]
  description = "macOS 上 100% 离线、开源的语音转文字。由 WhisperKit + CoreML 驱动。"
  author = "Jatin Kumar Malik"
  twitterHandle = "@jatinkrmalik"
  githubRepo = "https://github.com/fwz233-RE/vocamac-zh-CN"
  gaID = "G-8W6EJV2KP0"
  ogImage = "https://fwz233-re.github.io/vocamac-zh-CN/og-image.png"

[build]
  [build.buildStats]
    enable = false

[sitemap]
  changeFreq = "weekly"
  priority = 0.5

# robots.txt is served from static/robots.txt
enableRobotsTXT = false

# Disable Hugo's default taxonomies since we don't need them
[taxonomies]

# Disable default RSS
disableKinds = ["taxonomy", "term", "RSS"]
