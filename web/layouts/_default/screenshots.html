{{ define "main" }}
    <section class="screenshots-hero">
        <div class="container">
            <a href="/" class="back-link">← 返回首页</a>
            <h1>截图</h1>
            <p class="text-secondary">看看 VocaMac 的实际界面：从菜单栏到设置，再到录音指示器。</p>
        </div>
    </section>

    <section class="screenshots-grid">
        <div class="container">

            <!-- Menu Bar -->
            <div class="screenshot-section">
                <h2>📍 菜单栏</h2>
                <p class="text-secondary">VocaMac 常驻菜单栏，随时可用，又不打扰工作。</p>
                <div class="screenshot-group screenshot-group--pair">
                    <figure class="screenshot-item">
                        <img src="/screenshots/menu-bar-idle.png" alt="VocaMac 菜单栏图标 - 空闲状态" loading="lazy">
                        <figcaption>菜单栏 - 空闲</figcaption>
                    </figure>
                    <figure class="screenshot-item">
                        <img src="/screenshots/menu-bar-recording.png" alt="VocaMac 菜单栏图标 - 录音中" loading="lazy">
                        <figcaption>菜单栏 - 录音中</figcaption>
                    </figure>
                </div>
            </div>

            <!-- Popover Panel -->
            <div class="screenshot-section">
                <h2>🎙️ 弹出面板</h2>
                <p class="text-secondary">点击菜单栏图标可查看状态、上次转写结果和快捷操作。</p>
                <div class="screenshot-group screenshot-group--single">
                    <figure class="screenshot-item">
                        <img src="/screenshots/popover-panel.png" alt="VocaMac 弹出面板，显示状态与上次转写" loading="lazy">
                        <figcaption>弹出面板：状态、转写内容与控件</figcaption>
                    </figure>
                </div>
            </div>

            <!-- Settings -->
            <div class="screenshot-section">
                <h2>⚙️ 设置</h2>
                <p class="text-secondary">精细调节一切：快捷键、模型、音频等，分标签页清晰呈现。</p>
                <div class="screenshot-group screenshot-group--pair">
                    <figure class="screenshot-item">
                        <img src="/screenshots/settings-general.png" alt="VocaMac 设置 - 通用" loading="lazy">
                        <figcaption>通用 - 激活方式、快捷键、语言与行为</figcaption>
                    </figure>
                    <figure class="screenshot-item">
                        <img src="/screenshots/settings-models.png" alt="VocaMac 设置 - 模型" loading="lazy">
                        <figcaption>模型 - 系统信息、资源占用与模型管理</figcaption>
                    </figure>
                    <figure class="screenshot-item">
                        <img src="/screenshots/settings-audio.png" alt="VocaMac 设置 - 音频" loading="lazy">
                        <figcaption>音频 - 录音时长、静音检测与输入设备</figcaption>
                    </figure>
                    <figure class="screenshot-item">
                        <img src="/screenshots/settings-about.png" alt="VocaMac 设置 - 关于" loading="lazy">
                        <figcaption>关于 - 版本信息、系统详情与链接</figcaption>
                    </figure>
                </div>
            </div>

            <!-- Cursor Indicator -->
            <div class="screenshot-section">
                <h2>🔴 光标指示器</h2>
                <p class="text-secondary">录音时，文本光标附近会显示浮动麦克风图标，让你始终知道 VocaMac 正在聆听。</p>
                <div class="screenshot-group screenshot-group--single">
                    <figure class="screenshot-item">
                        <img src="/screenshots/cursor-indicator.png" alt="VocaMac 录音时的光标指示器" loading="lazy">
                        <figcaption>录音时文本光标附近的浮动麦克风指示器</figcaption>
                    </figure>
                </div>
            </div>

        </div>
    </section>
{{ end }}
