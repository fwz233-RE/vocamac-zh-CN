name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Initialize Xcode tools
        run: sudo xcodebuild -runFirstLaunch

      # ── Code Signing Setup ──────────────────────────────────────────────────
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_P12:          ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD:     ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          # Create a temporary keychain so the cert is isolated to this job
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the p12
          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign to access the key without a passphrase prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

          # Store the keychain path for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          # Verify the identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "❌ Developer ID certificate not found after import"
            exit 1
          fi
          echo "✅ Imported: $IDENTITY"
          echo "CODE_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Store notarization credentials
        env:
          NOTARIZE_APPLE_ID:   ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_TEAM_ID:    ${{ secrets.NOTARIZE_TEAM_ID }}
          NOTARIZE_PASSWORD:   ${{ secrets.NOTARIZE_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "AC_PASSWORD" \
            --apple-id  "$NOTARIZE_APPLE_ID" \
            --team-id   "$NOTARIZE_TEAM_ID" \
            --password  "$NOTARIZE_PASSWORD"

      # ── Bundled models (Whisper Tiny + punctuation) ────────────────────────
      - name: Set up Python for huggingface-cli
        run: |
          python3 -m venv "$RUNNER_TEMP/hf-venv"
          source "$RUNNER_TEMP/hf-venv/bin/activate"
          pip install -U huggingface_hub
          echo "$RUNNER_TEMP/hf-venv/bin" >> "$GITHUB_PATH"

      - name: Stage bundled Whisper Tiny and punctuation models
        run: ./scripts/stage-bundled-models.sh

      # ── Build & Package ──────────────────────────────────────────────────────
      - name: Run tests
        run: swift test

      - name: Build and create signed, notarized DMG
        run: ./scripts/dist.sh
        env:
          APP_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Verify code signature
        run: codesign -v --deep --strict VocaMac.app

      - name: Verify SPM resource bundles are correctly staged
        run: |
          echo "🔍 Checking SPM resource bundle layout..."
          FAIL=0

          # xcodebuild's Bundle.module accessor checks Bundle.main.resourceURL
          # which resolves to Contents/Resources/ for .app bundles.
          # Bundles must NOT be at the .app root (codesign rejects that).
          if ls VocaMac.app/*.bundle 1>/dev/null 2>&1; then
            echo "❌ Found .bundle at app root — will break codesign!"
            ls VocaMac.app/*.bundle
            FAIL=1
          fi

          FOUND_ANY=false
          for bundle in VocaMac.app/Contents/Resources/*.bundle; do
            [ -d "$bundle" ] || continue
            FOUND_ANY=true
            name="$(basename "$bundle")"
            echo "✅ $name — present in Contents/Resources/"
          done

          if [ "$FOUND_ANY" = false ]; then
            echo "❌ No .bundle directories found in Contents/Resources/!"
            FAIL=1
          fi

          # Verify the critical WhisperKit tokenizer fallback resources.
          # xcodebuild bundles have the structure: <bundle>/Contents/Resources/<file>
          HUB="VocaMac.app/Contents/Resources/swift-transformers_Hub.bundle"
          if [ ! -d "$HUB" ]; then
            echo "❌ swift-transformers_Hub.bundle missing!"
            FAIL=1
          else
            for f in gpt2_tokenizer_config.json t5_tokenizer_config.json; do
              # Search recursively — xcodebuild places resources in Contents/Resources/
              if find "$HUB" -name "$f" -print -quit | grep -q .; then
                echo "✅ $f present in swift-transformers_Hub.bundle"
              else
                echo "❌ Missing $f in swift-transformers_Hub.bundle"
                FAIL=1
              fi
            done
          fi

          # Verify the binary uses the xcodebuild accessor (contains resourceURL)
          if strings VocaMac.app/Contents/MacOS/VocaMac | grep -q 'resourceURL'; then
            echo "✅ Binary uses xcodebuild Bundle.module accessor"
          else
            echo "❌ Binary does NOT contain resourceURL — wrong accessor!"
            echo "   Ensure build.sh uses xcodebuild, not swift build."
            FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Bundle layout validation failed. See above for details."
            exit 1
          fi
          echo "✅ All SPM resource bundles are correctly staged."

      - name: Verify bundled Whisper Tiny and punctuation models
        run: |
          RES="VocaMac.app/Contents/Resources/BundledModels"
          TINY="${RES}/whisperkit-coreml/openai_whisper-tiny"
          test -d "${TINY}/MelSpectrogram.mlmodelc"
          test -d "${TINY}/AudioEncoder.mlmodelc"
          test -d "${TINY}/TextDecoder.mlmodelc"
          test -f "${TINY}/tokenizer.json"
          test -f "${TINY}/tokenizer_config.json"
          test -f "${RES}/punctuation/model.int8.onnx"
          echo "✅ Release ships with bundled Whisper Tiny + punctuation (no extra download needed)"

      - name: Rename artifacts with version
        run: |
          ARCH=$(uname -m)
          # dist.sh already names the DMG correctly; verify it exists
          ls -lh dist/VocaMac-*.dmg

          # Create ZIP from the signed .app
          ditto -c -k --sequesterRsrc --keepParent VocaMac.app \
            "dist/VocaMac-${{ steps.version.outputs.VERSION }}-${ARCH}.zip"

          echo "ZIP created:"
          ls -lh dist/VocaMac-*.zip

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 VocaMac-*.dmg VocaMac-*.zip > checksums.txt
          cat checksums.txt

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Delete temporary keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ── Release ─────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: |
            dist/VocaMac-*.dmg
            dist/VocaMac-*.zip
            dist/checksums.txt
          body: |
            ## VocaMac ${{ steps.version.outputs.VERSION }}

            **开箱即用**：DMG 已内置 Whisper Tiny 语音识别模型（含分词器）与中英文标点模型，安装后无需额外下载即可听写。

            ### 安装

            1. 下载 `VocaMac-${{ steps.version.outputs.VERSION }}-arm64.dmg`
            2. 打开 DMG，将 VocaMac 拖入「应用程序」
            3. 首次打开并授予**麦克风**、**辅助功能**、**输入监控**权限

            > 本版本经 **Developer ID 签名并公证**，macOS 可直接打开。

            ### 系统要求
            - macOS 13 (Ventura) 或更高
            - Apple Silicon (arm64)

            ### 可选
            如需更高识别精度，可在应用内 **设置 → 模型** 下载 Base / Small 等大型模型。

            ### 校验和 (SHA-256)
            见 `checksums.txt`。
